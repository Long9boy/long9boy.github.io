<!DOCTYPE html>
<html lang="en">
<head> 
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Long9tpmcr</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="icon" type="image/x-icon" href="MyIcon.ico">

  <style>
    body {
      margin: 0;
      font-family: 'Courier New', monospace;
      background: black;
      color: #00ffcc;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .container { text-align: center; }

    .typing {
      border-right: 2px solid #00ffcc;
      white-space: nowrap;
      overflow: hidden;
      animation: typing 3s steps(30), blink .7s infinite;
      margin: 0 auto 30px auto;
      width: fit-content; 
    }

    @keyframes typing { from { width: 0 } to { width: 100% } }
    @keyframes blink { 50% { border-color: transparent } }

    .links {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .links a {
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
      color: #00ffcc;
      text-decoration: none;
      border: 1px solid #00ffcc;
      padding: 12px 25px;
      min-width: 220px;
      border-radius: 8px;
      /* Animation mượt kiểu iPhone */
      transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
    }

    /* Khi trỏ vào danh sách: Tất cả mặc định thu nhỏ lại một chút */
    .links:hover a {
      transform: scale(0.9);
      opacity: 0.5;
    }

    /* NÚT ĐANG HOVER: TO NHẤT */
    .links a:hover {
      transform: scale(1.2) !important;
      opacity: 1 !important;
      background: #00ffcc;
      color: black;
      z-index: 10;
      box-shadow: 0 0 20px rgba(0, 255, 204, 0.4);
    }

    /* NÚT KẾ TIẾP (Ngay bên dưới): Nhỏ vừa */
    .links a:hover + a {
      transform: scale(1) translateY(5px) !important;
      opacity: 0.8 !important;
    }

    /* NÚT CÁCH 1 BẬC (Bên dưới nút kế tiếp): Nhỏ nhất */
    .links a:hover + a + a {
      transform: scale(0.85) translateY(10px) !important;
      opacity: 0.4 !important;
    }

    /* LOGIC CHO TRƯỜNG HỢP TRỎ VÀO NÚT Ở GIỮA HOẶC DƯỚI */
    /* Nếu bạn muốn hiệu ứng này hoàn hảo cho cả nút ở giữa, 
       CSS có hạn chế là không chọn được phần tử đứng trước. 
       Tuy nhiên với 3 nút, cấu trúc này hoạt động cực tốt khi trỏ từ trên xuống. */

    .links a i {
      margin-right: 12px;
      font-size: 1.3rem;
    }

    .icon-yt { color: #FF0000; }
    .icon-kofi { color: #FF5E5B; }
    .icon-discord { color: #5865F2; }

    .links a:hover i { color: black; }
  </style>
</head>
<body>

<div class="container">
  <h1 class="typing">Hi, I'm Long9tpmcr</h1>
  <p style="margin-bottom: 30px;">Developer | Minecraft | Coding</p>

  <div class="links">
    <a href="https://www.youtube.com/@long9tpmcr" target="_blank" rel="noopener noreferrer">
      <i class="fa-brands fa-youtube icon-yt"></i> YouTube
    </a>

    <a href="#" target="_blank" rel="noopener noreferrer">
      <i class="fa-solid fa-mug-hot icon-kofi"></i> Ko-fi
    </a>

    <a href="#" target="_blank" rel="noopener noreferrer">
      <i class="fa-brands fa-discord icon-discord"></i> Discord
    </a>
  </div>
</div>

</body>
</html>
