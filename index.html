<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Long9boy | Portfolio</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
        <link rel="icon" type="image/x-icon" href="MyIcon.ico" />
        <style>
            /* 1. CẤU HÌNH CHUNG */
            html { scroll-behavior: smooth; }
            body {
                margin: 0; padding: 0;
                font-family: "Courier New", monospace;
                background: black; color: #00ffcc;
                overflow-x: hidden;
            }

            /* 2. HERO SECTION */
            .hero {
                position: relative; height: 100vh; width: 100%;
                display: flex; justify-content: center; align-items: center;
                text-align: center;
                background-image: url("Background.png");
                background-size: cover; background-position: center; background-attachment: fixed;
            }
            .hero::before {
                content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
                background: linear-gradient(to bottom, rgba(0, 0, 0, 0.5) 0%, rgba(0, 0, 0, 0.8) 80%, black 100%);
                z-index: 1;
            }
            .container { position: relative; z-index: 2; }
            .typing {
                border-right: 3px solid #00ffcc; white-space: nowrap; overflow: hidden;
                animation: typing 3s steps(30), blink 0.7s infinite;
                margin: 0 auto 20px auto; width: fit-content; font-size: 2.5rem;
            }
            @keyframes typing { from { width: 0; } to { width: 100%; } }
            @keyframes blink { 50% { border-color: transparent; } }

            /* DOCK EFFECT STYLE */
            .links { display: flex; flex-direction: column; gap: 15px; margin-top: 30px; align-items: center; }
            .links a {
                display: flex; align-items: center; justify-content: center;
                color: #00ffcc; text-decoration: none;
                border: 1px solid #00ffcc; padding: 12px 25px; min-width: 220px;
                border-radius: 8px; background: rgba(0, 0, 0, 0.6);
                transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
                transform-origin: center; cursor: pointer;
            }
            .links a i { margin-right: 12px; font-size: 1.3rem; transition: color 0.4s; }
            .fa-youtube { color: #ff0000; }
            .fa-discord { color: #5865f2; }
            .fa-code { color: #ffcc00; }

            /* 3. PROJECTS SECTION */
            .projects-section {
                min-height: 100vh; display: flex; flex-direction: column;
                align-items: center; background: black; padding: 100px 20px; box-sizing: border-box;
            }
            .projects-list {
                width: 100%; max-width: 1000px; background: #111111;
                border-radius: 24px; padding: 15px; margin-bottom: 20px;
                box-shadow: 0 30px 60px rgba(0, 255, 204, 0.1), inset 0 1px 2px rgba(255, 255, 255, 0.05);
            }
            .project-item {
                display: flex; align-items: center; gap: 30px; padding: 25px;
                border-bottom: 1px solid rgba(0, 255, 204, 0.05);
                transition: all 0.4s ease; border-radius: 18px;
                text-decoration: none; color: white; cursor: pointer;
            }
            .project-item:hover {
                background: #1a1a1a; transform: scale(1.02) translateY(-8px);
                box-shadow: 0 15px 40px rgba(0, 0, 0, 0.8);
            }
            .project-media {
                width: 220px; height: 125px; flex-shrink: 0;
                background: #050505; border-radius: 12px; overflow: hidden;
                display: flex; align-items: center; justify-content: center;
                border: 1px solid rgba(0, 255, 204, 0.1);
            }
            .project-media img { width: 100%; height: 100%; object-fit: cover; }
            .project-info h3 { margin: 0; font-size: 1.4rem; color: #ffffff !important; }
            .project-info .description {
                margin: 10px 0 0; font-size: 1rem; color: #ffffff !important;
                font-family: "Times New Roman", Times, serif; line-height: 1.4;
                display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
                overflow: hidden; text-overflow: ellipsis; white-space: pre-line; opacity: 0.9;
            }

            /* 4. MODAL STYLE */
            .modal-overlay {
                position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(15px);
                display: none; justify-content: center; align-items: center; z-index: 9999;
            }
            .modal-content {
                background: transparent; width: 90%; max-width: 800px;
                position: relative; padding: 20px; color: white;
            }
            .modal-header-title {
                font-size: 1.5rem; color: #00ffcc; font-weight: bold;
                margin-bottom: 15px; text-align: center;
            }
            .modal-video-container {
                width: 100%; aspect-ratio: 16/9; background: #000;
                border-radius: 15px; overflow: hidden; box-shadow: 0 0 30px rgba(0, 255, 204, 0.2);
            }
            .modal-video-container iframe { width: 100%; height: 100%; border: none; }
            .modal-description {
                font-family: "Times New Roman", Times, serif; font-size: 1.1rem;
                line-height: 1.6; color: #eee; white-space: pre-line;
                margin-top: 20px; text-align: center;
            }
            .modal-btn-container { display: flex; justify-content: center; margin-top: 30px; }
            .modal-btn {
                padding: 12px 35px; background: #00ffcc; color: black;
                text-decoration: none; font-weight: bold; border-radius: 50px;
                transition: 0.3s; box-shadow: 0 0 15px #00ffcc;
                display: flex; align-items: center; gap: 10px;
            }
            .modal-btn:hover { transform: scale(1.1); box-shadow: 0 0 25px #00ffcc; }
        </style>
    </head>

    <body>
        <div class="modal-overlay" id="modalOverlay">
            <div class="modal-content" onclick="event.stopPropagation()">
                <div class="modal-header-title" id="modalProjectTitle">Project Name</div>
                <div id="modalVideoSection" class="modal-video-container"></div>
                <div class="modal-description" id="modalDescription"></div>
                <div class="modal-btn-container">
                    <a href="#" target="_blank" class="modal-btn" id="modalOpenLink">
                        OPEN LINK <i class="fa-solid fa-arrow-up-right-from-square"></i>
                    </a>
                </div>
            </div>
        </div>

        <div class="hero">
            <div class="container">
                <h1 class="typing">Hi, I'm Long9boy</h1>
                <p>Developer | Minecraft | Coding enthusiast</p>
                <div class="links" id="link-container">
                    <a href="https://www.youtube.com/@long9tpmcr" target="_blank"><i class="fa-brands fa-youtube"></i> YouTube</a>
                    <a href="https://discord.gg/eD9726Vv" target="_blank"><i class="fa-brands fa-discord"></i> Discord</a>
                    <a href="javascript:void(0)" class="scroll-link" data-target="projects"><i class="fa-solid fa-code"></i> Recent Projects</a>
                </div>
            </div>
        </div>

        <div id="projects" class="projects-section">
            <div class="projects-list">
                <div class="project-item yt-auto-full" 
                     data-youtube="https://youtu.be/kFUL31ziGOI" 
                     onclick="openModal('Yasuo Addon 1.21.15+', 'https://youtu.be/kFUL31ziGOI', 'https://www.mediafire.com/file/bp6rsmdlgm1xue9/Yasuo_Nightbringer.mcaddon/file')">
                    <div class="project-media">
                        <i class="fa-solid fa-circle-notch fa-spin" style="color: #00ffcc"></i>
                    </div>
                    <div class="project-info">
                        <h3>Yasuo Addon 1.21.15+</h3>
                        <div class="description">Đang tải thông tin từ YouTube...</div>
                    </div>
                </div>
            </div>

            <div class="projects-list">
                <div class="project-item yt-auto-full" 
                     data-youtube="https://youtu.be/LULR6LoIOdM" 
                     onclick="openModal('New Crate [v2] 1.21.30+', 'https://youtu.be/LULR6LoIOdM', 'https://www.mediafire.com/file/vz31w11plu38elu/Crate_%255BV2%255D_%255B1.21.30%255D.zip/file')">
                    <div class="project-media">
                        <i class="fa-solid fa-circle-notch fa-spin" style="color: #00ffcc"></i>
                    </div>
                    <div class="project-info">
                        <h3>New Crate [v2] 1.21.30+</h3>
                        <div class="description">Đang tải thông tin từ YouTube...</div>
                    </div>
                </div>
            </div>
        </div>

        <script>
            const overlay = document.getElementById("modalOverlay");

            // HÀM MỞ MODAL ĐÃ SỬA LỖI
            function openModal(title, youtubeLink, downloadLink) {
                document.getElementById("modalProjectTitle").innerText = title;
                document.getElementById("modalOpenLink").href = downloadLink || "#";
                
                const videoSection = document.getElementById("modalVideoSection");
                const descSection = document.getElementById("modalDescription");

                // Mặc định mô tả là tên project (hoặc bạn có thể thêm tham số desc nếu muốn)
                descSection.innerText = "Check out the full preview of " + title;

                if (youtubeLink && youtubeLink.includes("youtu")) {
                    let videoId = "";
                    // Xử lý nhiều định dạng link Youtube (short link, watch link, kèm tham số ?si=)
                    if (youtubeLink.includes("watch?v=")) {
                        videoId = youtubeLink.split("v=")[1].split("&")[0];
                    } else if (youtubeLink.includes("youtu.be/")) {
                        videoId = youtubeLink.split("youtu.be/")[1].split("?")[0];
                    } else {
                        videoId = youtubeLink.split("/").pop().split("?")[0];
                    }

                    videoSection.style.display = "block";
                    // Nhúng Iframe với các quyền cho phép phát video
                    videoSection.innerHTML = `<iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
                } else {
                    videoSection.style.display = "none";
                    videoSection.innerHTML = "";
                }

                overlay.style.display = "flex";
                document.body.style.overflow = "hidden";
            }

            function closeModal() {
                overlay.style.display = "none";
                document.getElementById("modalVideoSection").innerHTML = "";
                document.body.style.overflow = "auto";
            }

            overlay.addEventListener("click", closeModal);

            // TỰ ĐỘNG LẤY THUMBNAIL VÀ TIÊU ĐỀ TỪ YOUTUBE
            async function loadYouTubeData() {
                const items = document.querySelectorAll(".yt-auto-full");
                for (const item of items) {
                    const url = item.getAttribute("data-youtube");
                    try {
                        const response = await fetch(`https://noembed.com/embed?url=${url}`);
                        const data = await response.json();
                        if (data.title) {
                            item.querySelector(".project-media").innerHTML = `<img src="${data.thumbnail_url}" alt="Thumbnail">`;
                            item.querySelector(".description").innerHTML = `<span class="yt-title-line">${data.title}</span>`;
                        }
                    } catch (e) { console.error("Lỗi load YouTube data:", e); }
                }
            }

            // DOCK EFFECT FOR LINKS
            const linkContainer = document.getElementById("link-container");
            const links = Array.from(linkContainer.querySelectorAll("a"));

            links.forEach((link, index) => {
                link.addEventListener("mousemove", () => {
                    links.forEach((l, i) => {
                        const distance = Math.abs(i - index);
                        let scale = 1, opacity = 1, translateY = 0;

                        if (distance === 0) {
                            scale = 1.3;
                            l.style.background = "#00ffcc";
                            l.style.color = "black";
                            l.style.boxShadow = "0 0 25px #00ffcc";
                            l.querySelector("i").style.color = "black";
                        } else {
                            scale = distance === 1 ? 0.95 : 0.85;
                            opacity = distance === 1 ? 0.6 : 0.35;
                            translateY = i < index ? (distance === 1 ? -15 : -25) : (distance === 1 ? 15 : 25);
                            l.style.background = "rgba(0, 0, 0, 0.6)";
                            l.style.color = "#00ffcc";
                            l.style.boxShadow = "none";
                            resetIconColor(l);
                        }
                        l.style.transform = `scale(${scale}) translateY(${translateY}px)`;
                        l.style.opacity = opacity;
                    });
                });
            });

            function resetIconColor(el) {
                const icon = el.querySelector("i");
                if (icon.classList.contains("fa-youtube")) icon.style.color = "#ff0000";
                if (icon.classList.contains("fa-discord")) icon.style.color = "#5865F2";
                if (icon.classList.contains("fa-code")) icon.style.color = "#ffcc00";
            }

            linkContainer.addEventListener("mouseleave", () => {
                links.forEach((l) => {
                    l.style.transform = "scale(1) translateY(0px)";
                    l.style.opacity = "1";
                    l.style.background = "rgba(0, 0, 0, 0.6)";
                    l.style.color = "#00ffcc";
                    l.style.boxShadow = "none";
                    resetIconColor(l);
                });
            });

            // SCROLL SMOOTH
            document.querySelectorAll(".scroll-link").forEach((link) => {
                link.addEventListener("click", function (e) {
                    const targetId = this.getAttribute("data-target");
                    const targetElement = document.getElementById(targetId);
                    if (targetElement) targetElement.scrollIntoView({ behavior: "smooth" });
                });
            });

            window.addEventListener("DOMContentLoaded", loadYouTubeData);
        </script>
    </body>
</html>
