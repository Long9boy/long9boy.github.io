<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Long9boy | Portfolio</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="icon" type="image/x-icon" href="MyIcon.ico">

  <style>
    /* CẤU HÌNH CHUNG */
    html { scroll-behavior: smooth; }
    body {
      margin: 0; padding: 0;
      font-family: 'Courier New', monospace;
      background: black; color: #00ffcc;
      overflow-x: hidden;
    }

    /* HERO SECTION */
    .hero {
      position: relative; height: 100vh; width: 100%;
      display: flex; justify-content: center; align-items: center; text-align: center;
      background-image: url('Background.png'); background-size: cover;
      background-position: center; background-attachment: fixed;
    }
    .hero::before {
      content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.7) 70%, black 100%);
      z-index: 1;
    }
    .container { position: relative; z-index: 2; }
    .typing {
      border-right: 3px solid #00ffcc; white-space: nowrap; overflow: hidden;
      animation: typing 3s steps(30), blink .7s infinite;
      margin: 0 auto 20px auto; width: fit-content; font-size: 2.5rem;
    }
    @keyframes typing { from { width: 0 } to { width: 100% } }
    @keyframes blink { 50% { border-color: transparent } }

    /* LINKS / DOCK */
    .links { display: flex; flex-direction: column; gap: 15px; margin-top: 30px; align-items: center; }
    .links a {
      display: flex; align-items: center; justify-content: center;
      color: #00ffcc; text-decoration: none;
      border: 1px solid #00ffcc; padding: 12px 25px; min-width: 220px;
      border-radius: 8px; background: rgba(0, 0, 0, 0.6);
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* PROJECTS SECTION */
    .projects-section {
      min-height: 100vh; display: flex; flex-direction: column; gap: 20px;
      align-items: center; background: black; padding: 100px 20px;
    }
    .projects-list { width: 100%; max-width: 850px; }

    .project-item {
      display: flex; align-items: center; gap: 20px; padding: 15px;
      background: #111; border-radius: 15px; margin-bottom: 15px;
      transition: 0.3s; cursor: pointer; text-decoration: none; color: white;
      border: 1px solid rgba(0, 255, 204, 0.1);
    }
    .project-item:hover { background: #1a1a1a; transform: translateY(-3px); border-color: #00ffcc; }

    .project-media {
      width: 160px; height: 90px; flex-shrink: 0;
      background: #050505; border-radius: 8px; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; color: #333;
    }
    .project-media img { width: 100%; height: 100%; object-fit: cover; }

    .project-info { flex-grow: 1; overflow: hidden; }
    .project-info h3 { margin: 0; font-size: 1.2rem; color: #00ffcc; }
    .project-info .description {
      margin-top: 5px; font-size: 0.9rem; color: #ccc;
      display: -webkit-box; -webkit-line-clamp: 2; /* Giới hạn 2 dòng */
      -webkit-box-orient: vertical; overflow: hidden; line-height: 1.4;
    }

    /* MODAL / DIALOG */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(10px);
      display: none; justify-content: center; align-items: center; z-index: 10000;
    }
    .modal-content {
      background: rgba(20, 20, 20, 0.95); width: 90%; max-width: 700px;
      border-radius: 20px; overflow: hidden; border: none;
      box-shadow: 0 0 30px rgba(0,0,0,0.5); position: relative;
    }
    .modal-header { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .modal-header h2 { margin: 0; font-size: 1.5rem; color: #00ffcc; }
    .modal-body { padding: 20px; }
    .modal-video-container { width: 100%; aspect-ratio: 16/9; border-radius: 10px; overflow: hidden; background: #000; margin-bottom: 15px; }
    .modal-video-container iframe { width: 100%; height: 100%; border: none; }
    .modal-desc { color: #eee; font-size: 0.95rem; line-height: 1.6; margin-bottom: 20px; }
    .modal-footer { padding: 20px; text-align: center; background: rgba(0,0,0,0.2); }
    .modal-btn { 
      padding: 12px 30px; background: #00ffcc; color: black; 
      text-decoration: none; font-weight: bold; border-radius: 8px; display: inline-block;
    }
  </style>
</head>
<body>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-content" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h2 id="modalProjectTitle">Project Title</h2>
    </div>
    <div class="modal-body">
      <div id="modalVideoSection" class="modal-video-container"></div>
      <div id="modalDescription" class="modal-desc"></div>
    </div>
    <div class="modal-footer">
      <a href="#" target="_blank" class="modal-btn" id="modalOpenLink">GET STARTED <i class="fa-solid fa-arrow-right"></i></a>
    </div>
  </div>
</div>

<div class="hero">
  <div class="container">
    <h1 class="typing">Hi, I'm Long9boy</h1>
    <p>Developer | Minecraft | Coding enthusiast</p>
    <div class="links" id="link-container">
      <a href="https://www.youtube.com/@long9tpmcr" target="_blank"><i class="fa-brands fa-youtube" style="color:#ff0000; margin-right:10px;"></i> YouTube</a>
      <a href="javascript:void(0)" class="scroll-link" data-target="projects"><i class="fa-solid fa-code" style="color:#ffcc00; margin-right:10px;"></i> Recent Projects</a>
    </div>
  </div>
</div>

<div id="projects" class="projects-section">
  
  <div class="projects-list">
    <div class="project-item yt-auto-full" 
         data-youtube="https://youtu.be/kFUL31ziGOI"
         data-custom-desc="Đây là mô tả bổ sung cho Yasuo Addon nếu bạn muốn viết thêm ngoài tiêu đề video."
         data-link="https://www.mediafire.com/file/example"
         onclick="handleProjectClick(this)">
      <div class="project-media"><i class="fa-solid fa-image"></i></div>
      <div class="project-info">
        <h3>Yasuo Addon V2</h3> 
        <div class="description">Đang tải thông tin từ YouTube...</div>
      </div>
    </div>
  </div>

  <div class="projects-list">
    <div class="project-item" 
         data-img="https://via.placeholder.com/160x90"
         data-custom-desc="Đây là một project Minecraft modding không có video giới thiệu."
         data-link="https://github.com/"
         onclick="handleProjectClick(this)">
      <div class="project-media"><img src="https://via.placeholder.com/160x90" onerror="this.parentElement.innerHTML='<i class=\'fa-solid fa-image-slash\'></i>'"></div>
      <div class="project-info">
        <h3>Minecraft Custom GUI</h3> 
        <div class="description">Mô tả ngắn gọn về project này tại đây...</div>
      </div>
    </div>
  </div>

</div>

<script>
  // 1. TỰ ĐỘNG LẤY DATA YOUTUBE
  async function loadYouTubeData() {
    const items = document.querySelectorAll('.yt-auto-full');
    for (const item of items) {
      const url = item.getAttribute('data-youtube');
      const customDesc = item.getAttribute('data-custom-desc') || "";
      try {
        const response = await fetch(`https://noembed.com/embed?url=${url}`);
        const data = await response.json();
        if (data.title) {
          item.querySelector('.project-media').innerHTML = `<img src="${data.thumbnail_url}">`;
          // Hiển thị: Tiêu đề video + Xuống dòng + Mô tả tùy chỉnh
          item.querySelector('.description').innerHTML = `<b>${data.title}</b><br>${customDesc}`;
        }
      } catch (e) { 
        item.querySelector('.project-media').innerHTML = `<i class="fa-solid fa-play-circle"></i>`;
      }
    }
  }

  // 2. XỬ LÝ CLICK MỞ DIALOG
  function handleProjectClick(el) {
    const title = el.querySelector('h3').innerText;
    const fullDesc = el.querySelector('.description').innerHTML;
    const yt = el.getAttribute('data-youtube');
    const link = el.getAttribute('data-link');

    document.getElementById('modalProjectTitle').innerText = title;
    document.getElementById('modalDescription').innerHTML = fullDesc;
    document.getElementById('modalOpenLink').href = link;

    const videoSection = document.getElementById('modalVideoSection');
    if (yt) {
      let videoId = yt.includes('v=') ? yt.split('v=')[1].split('&')[0] : yt.split('/').pop();
      videoSection.style.display = 'block';
      videoSection.innerHTML = `<iframe src="https://www.youtube.com/embed/${videoId}" allowfullscreen></iframe>`;
    } else {
      videoSection.style.display = 'none';
    }
    
    document.getElementById('modalOverlay').style.display = 'flex';
    document.body.style.overflow = 'hidden';
  }

  // Đóng Modal
  document.getElementById('modalOverlay').onclick = function() {
    this.style.display = 'none';
    document.getElementById('modalVideoSection').innerHTML = '';
    document.body.style.overflow = 'auto';
  };

  window.addEventListener('DOMContentLoaded', loadYouTubeData);
</script>

</body>
</html>
