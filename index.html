<!DOCTYPE html>
<html lang="en">
<head> 
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Long9boy</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="icon" type="image/x-icon" href="MyIcon.ico">

  <style>
    /* Cho phép cuộn trang mượt mà */
    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: 'Courier New', monospace;
      background: black;
      color: #00ffcc;
    }

    /* PHẦN 1: MÀN HÌNH CHÀO MỪNG (HERO SECTION) */
    .hero {
      position: relative;
      height: 100vh;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      
      /* Cài đặt ảnh nền */
      background-image: url('Background.png');
      background-size: cover;      /* Ảnh luôn phủ kín màn hình */
      background-position: center; /* Căn giữa ảnh */
      background-attachment: fixed; /* Hiệu ứng ảnh đứng yên khi cuộn (Parallax) */
    }

    /* LỚP PHỦ MÀU ĐEN (OVERLAY) */
    /* Dùng để làm tối ảnh và tạo ranh giới đen đặc ở dưới cùng */
    .hero::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      
      /* Giải thích Gradient:
         - 0% đến 70%: Màu đen nhạt (rgba 0.5) để chữ dễ đọc nhưng vẫn thấy ảnh.
         - 80% đến 100%: Chuyển dần sang đen đặc hoàn toàn để tạo ranh giới 1/5 bên dưới. */
      background: linear-gradient(
        to bottom,
        rgba(0, 0, 0, 0.5) 0%,    /* Trên cùng: Đen mờ */
        rgba(0, 0, 0, 0.5) 70%,   /* Giữa: Giữ nguyên độ mờ */
        rgba(0, 0, 0, 1) 100%     /* Dưới cùng (1/5 cuối): Đen đặc hoàn toàn */
      );
      z-index: 1;
    }

    /* Đảm bảo nội dung luôn nổi lên trên lớp phủ đen */
    .container {
      position: relative;
      z-index: 2;
    }

    /* HIỆU ỨNG GÕ CHỮ */
    .typing {
      border-right: 2px solid #00ffcc;
      white-space: nowrap;
      overflow: hidden;
      animation: typing 3s steps(30), blink .7s infinite;
      margin: 0 auto 30px auto;
      width: fit-content; 
    }

    @keyframes typing { from { width: 0 } to { width: 100% } }
    @keyframes blink { 50% { border-color: transparent } }

    /* DANH SÁCH NÚT BẤM */
    .links {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .links a {
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
      color: #00ffcc;
      text-decoration: none;
      border: 1px solid #00ffcc;
      padding: 12px 25px;
      min-width: 220px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.4); /* Nền nút hơi trong suốt */
      transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1); /* Animation kiểu iPhone */
    }

    /* CSS cho các class sẽ được thêm bằng JavaScript khi hover */
    .links a.hover-large { transform: scale(1.25); background: #00ffcc; color: black; opacity: 1; z-index: 10; box-shadow: 0 0 25px rgba(0, 255, 204, 0.5); }
    .links a.hover-medium { transform: scale(0.95); opacity: 0.6; }
    .links a.hover-small { transform: scale(0.8); opacity: 0.3; }

    /* Màu sắc Icon */
    .links a i { margin-right: 12px; font-size: 1.3rem; }
    .icon-yt { color: #FF0000; }
    .icon-discord { color: #5865F2; }
    .icon-project { color: #f1c40f; }
    
    .links a.hover-large i { color: black; }

    /* PHẦN 2: TRANG DỰ ÁN (PROJECTS SECTION) */
    .projects-section {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: black; /* Tiếp nối phần đen đặc ở cuối Hero */
      text-align: center;
    }
  </style>
</head>
<body>

<div class="hero">
  <div class="container">
    <h1 class="typing">Hi, I'm Long9boy</h1>
    <p style="margin-bottom: 30px;">Developer | Minecraft | Coding</p>

    <div class="links" id="link-container">
      <a href="https://www.youtube.com/@long9tpmcr" target="_blank" rel="noopener noreferrer">
        <i class="fa-brands fa-youtube icon-yt"></i> YouTube
      </a>

      <a href="https://discord.gg/eD9726Vv" target="_blank" rel="noopener noreferrer">
        <i class="fa-brands fa-discord icon-discord"></i> Discord
      </a>

      <a href="#projects">
        <i class="fa-solid fa-code icon-project"></i> Recent Project
      </a>
    </div>
  </div>
</div>

<div id="projects" class="projects-section">
  <h2 style="font-size: 2.5rem;">My Recent Projects</h2>
  <p>Website đang được phát triển bởi Long9tpmcr.</p>
</div>

<script>
  /* JAVASCRIPT XỬ LÝ HIỆU ỨNG IPHONE DOCK (PHÓNG TO THEO KHOẢNG CÁCH) */
  const container = document.getElementById('link-container');
  const links = Array.from(container.querySelectorAll('a'));

  links.forEach((link, index) => {
    link.addEventListener('mouseenter', () => {
      links.forEach((l, i) => {
        const distance = Math.abs(i - index); // Tính nút nào gần nút đang trỏ nhất
        l.classList.remove('hover-large', 'hover-medium', 'hover-small');
        
        if (distance === 0) l.classList.add('hover-large');     // Nút to nhất
        else if (distance === 1) l.classList.add('hover-medium'); // Nút kế bên nhỏ hơn
        else l.classList.add('hover-small');                    // Nút xa nhất nhỏ nhất
      });
    });
  });

  /* Khi đưa chuột ra ngoài, xóa hết các class hiệu ứng */
  container.addEventListener('mouseleave', () => {
    links.forEach(l => l.classList.remove('hover-large', 'hover-medium', 'hover-tiny'));
  });
</script>

</body>
</html>
