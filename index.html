<!DOCTYPE html>
<html lang="en">
<head> 
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Long9boy | Portfolio</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="icon" type="image/x-icon" href="MyIcon.ico">

  <style>
    /* 1. CẤU HÌNH CHUNG */
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      padding: 0;
      font-family: 'Courier New', monospace;
      background: black;
      color: #00ffcc;
      overflow-x: hidden;
    }

    /* 2. HERO SECTION */
    .hero {
      position: relative;
      height: 100vh;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      background-image: url('Background.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    .hero::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.8) 80%, black 100%);
      z-index: 1;
    }

    .container { position: relative; z-index: 2; }

    .typing {
      border-right: 3px solid #00ffcc;
      white-space: nowrap;
      overflow: hidden;
      animation: typing 3s steps(30), blink .7s infinite;
      margin: 0 auto 20px auto;
      width: fit-content;
      font-size: 2.5rem;
    }
    @keyframes typing { from { width: 0 } to { width: 100% } }
    @keyframes blink { 50% { border-color: transparent } }

    /* DOCK EFFECT (NÚT BẤM) */
    .links { display: flex; flex-direction: column; gap: 15px; margin-top: 30px; }
    .links a {
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto; color: #00ffcc; text-decoration: none;
      border: 1px solid #00ffcc; padding: 12px 25px; min-width: 220px;
      border-radius: 8px; background: rgba(0, 0, 0, 0.6);
      transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
    }
    .links a.hover-large { transform: scale(1.2); background: #00ffcc; color: black; box-shadow: 0 0 20px #00ffcc; }
    .links a.hover-medium { transform: scale(0.95); opacity: 0.7; }
    .links a.hover-small { transform: scale(0.85); opacity: 0.4; }
    .links a i { margin-right: 12px; }

    /* 3. PROJECTS SECTION */
    .projects-section {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: black;
      padding: 100px 20px;
      box-sizing: border-box;
    }

    .projects-list {
      width: 100%;
      max-width: 1000px;
      background: #111111; 
      border-radius: 24px;
      padding: 15px;
      box-shadow: 0 30px 60px rgba(0, 255, 204, 0.1), 
                  inset 0 1px 2px rgba(255, 255, 255, 0.05);
    }

    .project-item {
      display: flex;
      align-items: center;
      gap: 30px;
      padding: 25px;
      border-bottom: 1px solid rgba(0, 255, 204, 0.05);
      transition: all 0.4s ease;
      border-radius: 18px;
      text-decoration: none;
      color: inherit;
    }

    .project-item:last-child { border-bottom: none; }

    .project-item:hover {
      background: #1a1a1a;
      transform: scale(1.02) translateY(-8px);
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.8);
      z-index: 10;
    }

    .project-media {
      width: 220px;
      height: 125px;
      flex-shrink: 0;
      background: #050505;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(0, 255, 204, 0.1);
    }

    .project-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .project-media i {
      font-size: 2.5rem;
      color: #222;
    }

    .project-info {
      flex-grow: 1;
    }

    .project-info h3 {
      margin: 0;
      font-size: 1.4rem;
      color: #00ffcc;
    }

    .project-info p {
      margin: 10px 0 0;
      font-size: 0.95rem;
      color: #888;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .loading-pulse {
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0% { opacity: 0.5; }
      50% { opacity: 1; }
      100% { opacity: 0.5; }
    }
  </style>
</head>
<body>

<div class="hero">
  <div class="container">
    <h1 class="typing">Hi, I'm Long9boy</h1>
    <p>Developer | Minecraft | Coding enthusiast</p>

    <div class="links" id="link-container">
      <a href="https://www.youtube.com/@long9tpmcr" target="_blank"><i class="fa-brands fa-youtube"></i> YouTube</a>
      <a href="https://discord.gg/eD9726Vv" target="_blank"><i class="fa-brands fa-discord"></i> Discord</a>
      <a href="#projects"><i class="fa-solid fa-code"></i> Recent Projects</a>
    </div>
  </div>
</div>

<div id="projects" class="projects-section">
  <div class="projects-list" id="projects-list">
    
    <a href="https://youtu.be/kFUL31ziGOI?si=mQu3IPnDkn-FROsg" class="project-item yt-project" data-youtube="https://youtu.be/kFUL31ziGOI?si=mQu3IPnDkn-FROsg">
      <div class="project-media">
        <i class="fa-solid fa-circle-notch fa-spin"></i>
      </div>
      <div class="project-info">
        <h3 class="loading-pulse">Fetching video...</h3>
        <p></p>
      </div>
    </a>

    <a href="#" class="project-item">
      <div class="project-media">
        <i class="fa-solid fa-file-code"></i>
      </div>
      <div class="project-info">
        <h3>Discord Bot Manager</h3>
        <p>Bot quản lý server tự động, tích hợp API tra cứu người chơi Minecraft.</p>
      </div>
    </a>

  </div>
</div>

<script>
  // TỰ ĐỘNG LẤY DATA TỪ YOUTUBE
  async function setupYouTubeProjects() {
    const ytProjects = document.querySelectorAll('.yt-project');
    
    for (const project of ytProjects) {
      const videoUrl = project.getAttribute('data-youtube');
      const titleEl = project.querySelector('h3');
      const descEl = project.querySelector('p');
      const mediaEl = project.querySelector('.project-media');

      try {
        const response = await fetch(`https://noembed.com/embed?url=${videoUrl}`);
        const data = await response.json();

        if (data.title) {
          titleEl.innerText = data.title;
          titleEl.classList.remove('loading-pulse');
          mediaEl.innerHTML = `<img src="${data.thumbnail_url}" alt="YouTube Thumbnail">`;
          descEl.innerText = "YouTube Video • " + data.author_name;
        }
      } catch (e) {
        titleEl.innerText = "Video Link Error";
        mediaEl.innerHTML = `<i class="fa-solid fa-video-slash"></i>`;
      }
    }
  }

  // HIỆU ỨNG DOCK
  const linkContainer = document.getElementById('link-container');
  const links = Array.from(linkContainer.querySelectorAll('a'));

  links.forEach((link, index) => {
    link.addEventListener('mouseenter', () => {
      links.forEach((l, i) => {
        const distance = Math.abs(i - index);
        l.classList.remove('hover-large', 'hover-medium', 'hover-small');
        if (distance === 0) l.classList.add('hover-large');
        else if (distance === 1) l.classList.add('hover-medium');
        else l.classList.add('hover-small');
      });
    });
  });

  linkContainer.addEventListener('mouseleave', () => {
    links.forEach(l => l.classList.remove('hover-large', 'hover-medium', 'hover-small'));
  });

  window.addEventListener('DOMContentLoaded', setupYouTubeProjects);
</script>

</body>
</html>
