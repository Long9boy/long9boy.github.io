<!DOCTYPE html>
<html lang="en">
<head> 
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Long9tpmcr</title>

<link rel="icon" href="MyIcon.ico">

<style>
body {
  margin: 0;
  font-family: 'Courier New', monospace;
  background: black;
  color: #00ffcc;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* typing effect */
.typing {
  border-right: 2px solid #00ffcc;
  white-space: nowrap;
  overflow: hidden;
  animation: typing 3s steps(30), blink .7s infinite;
}

@keyframes typing {
  from { width: 0 }
  to { width: 100% }
}

@keyframes blink {
  50% { border-color: transparent }
}

.container {
  text-align: center;
}

.links a {
  display: block;
  margin: 10px;
  color: #00ffcc;
  text-decoration: none;
  border: 1px solid #00ffcc;
  padding: 10px;
  transition: 0.3s;
}

.links a:hover {
  background: #00ffcc;
  color: black;
}
</style>
</head>

<body>

<div class="container">
  <h1 class="typing">Hi, I'm Long9tpmcr</h1>
  <p>Developer | Minecraft | Coding</p>

  <div class="links">
    <a href="#">GitHub</a>
    <a href="#">Ko-fi</a>
    <a href="#">Discord</a>
  </div>
</div>

</body>
</html>
