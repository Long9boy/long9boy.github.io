<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Long9boy | Portfolio</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<link rel="icon" type="image/x-icon" href="MyIcon.ico" />

<style>
html { scroll-behavior: smooth; }
body {
    margin:0; padding:0;
    font-family:"Courier New", monospace;
    background:black; color:#00ffcc;
    overflow-x:hidden;
}

/* HERO */
.hero {
    position:relative;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    background:url("Background.png") center/cover fixed;
}
.hero::before {
    content:"";
    position:absolute; inset:0;
    background:linear-gradient(to bottom, rgba(0,0,0,.5), rgba(0,0,0,.9));
}
.container { position:relative; z-index:2; }

.typing {
    border-right:3px solid #00ffcc;
    white-space:nowrap; overflow:hidden;
    animation:typing 3s steps(30), blink .7s infinite;
    font-size:2.5rem;
}
@keyframes typing { from{width:0} to{width:100%} }
@keyframes blink { 50%{border-color:transparent} }

.links { display:flex; flex-direction:column; gap:15px; margin-top:30px; }
.links a {
    color:#00ffcc;
    border:1px solid #00ffcc;
    padding:12px 25px;
    border-radius:8px;
    text-decoration:none;
    transition:.3s;
}

/* PROJECT */
.projects-section {
    padding:100px 20px;
    display:flex;
    flex-direction:column;
    align-items:center;
}
.projects-list {
    width:100%; max-width:1000px;
    background:#111;
    border-radius:20px;
    padding:15px;
}
.project-item {
    display:flex; gap:20px;
    padding:20px;
    border-bottom:1px solid #222;
    cursor:pointer;
}
.project-media {
    width:220px; height:125px;
    background:#000;
    border-radius:10px;
    overflow:hidden;
}
.project-media img {
    width:100%; height:100%; object-fit:cover;
}
.description {
    white-space:pre-line;
    font-family:"Times New Roman";
}

/* MODAL */
.modal-overlay {
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.85);
    display:none;
    justify-content:center;
    align-items:center;
}
.modal-content {
    width:90%; max-width:800px;
    color:white;
}
.modal-video-container {
    aspect-ratio:16/9;
}
.modal-video-container iframe {
    width:100%; height:100%;
}
</style>
</head>

<body>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
<div class="modal-content" onclick="event.stopPropagation()">
    <h2 id="modalProjectTitle"></h2>
    <div id="modalVideoSection" class="modal-video-container"></div>
    <div id="modalDescription"></div>
</div>
</div>

<!-- HERO -->
<div class="hero">
<div class="container">
<h1 class="typing">Hi, I'm Long9boy</h1>

<div class="links">
<a href="https://www.youtube.com/@long9tpmcr" target="_blank">YouTube</a>
<a href="https://discord.gg/eD9726Vv" target="_blank">Discord</a>
</div>
</div>
</div>

<!-- PROJECT -->
<div class="projects-section">

<div class="projects-list">
<div class="project-item yt-auto-full"
data-youtube="https://youtu.be/kFUL31ziGOI">
<div class="project-media">Loading...</div>
<div>
<h3>Yasuo Addon</h3>
<div class="description">Đang tải...</div>
</div>
</div>
</div>

</div>

<script>
const overlay = document.getElementById("modalOverlay");

function getVideoId(url){
    return url.includes("watch?v=")
        ? url.split("v=")[1].split("&")[0]
        : url.split("/").pop().split("?")[0];
}

/* LOAD DATA */
async function loadYouTubeData(){
    const items = document.querySelectorAll(".yt-auto-full");

    for(const item of items){
        const url = item.dataset.youtube;
        const id = getVideoId(url);

        try{
            const res = await fetch(`https://yt.lemnoslife.com/videos?part=snippet&id=${id}`);
            const data = await res.json();
            const snip = data.items[0].snippet;

            const thumb = snip.thumbnails.high.url;

            item.querySelector(".project-media").innerHTML =
                `<img src="${thumb}">`;

            item.querySelector(".description").innerHTML =
                `<b>${snip.title}</b>\n${snip.description}`;

            /* CLICK */
            item.onclick = () => openModal(snip, id);

        }catch(e){
            console.error(e);
        }
    }
}

/* MODAL */
function openModal(snip, id){
    document.getElementById("modalProjectTitle").innerText = snip.title;

    document.getElementById("modalVideoSection").innerHTML =
        `<iframe src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe>`;

    document.getElementById("modalDescription").innerText =
        snip.description;

    overlay.style.display="flex";
}

overlay.onclick = () => {
    overlay.style.display="none";
};

window.onload = loadYouTubeData;
</script>

</body>
</html>
