    font-size: 2rem;

    background: rgba(0, 0, 0, 0.6);

    background: rgba(20, 20, 20, 0.6);

    text-align: left;

<!-- ===== JS ===== -->
<script>
const overlay = document.getElementById("modalOverlay");

function getYoutubeId(url) {
    if (!url) return null;

    if (url.includes("watch?v=")) {
        return url.split("v=")[1].split("&")[0];
    }

    return url.split("/").pop().split("?")[0];
}

function loadProjects() {
    const items = document.querySelectorAll(".project-item");

    items.forEach(async (item) => {
        const title = item.dataset.title || "No title";
        const desc = item.dataset.description || "";
        const youtube = item.dataset.youtube;
        const image = item.dataset.image;

        const media = item.querySelector(".project-media");
        const titleEl = item.querySelector("h3");
        const descEl = item.querySelector(".description");

        titleEl.innerText = title;

        // IMAGE
        if (youtube) {
            const id = getYoutubeId(youtube);
            media.innerHTML = `<img src="https://img.youtube.com/vi/${id}/hqdefault.jpg">`;
        } else if (image) {
            media.innerHTML = `<img src="${image}">`;
        } else {
            media.innerHTML = `<i class="fa-solid fa-image-slash no-image"></i>`;
        }

        // DESCRIPTION
        if (youtube) {
            try {
                const res = await fetch(`https://noembed.com/embed?url=${youtube}`);
                const data = await res.json();

                descEl.innerHTML =
                    `<span class="yt-title-line">${data.title}</span>` +
                    (desc || "");
            } catch {
                descEl.innerText = desc;
            }
        } else {
            descEl.innerText = desc;
        }

        item.onclick = () => openModal(item);
    });
}

function openModal(item) {
    const title = item.dataset.title;
    const desc = item.dataset.description || "";
    const youtube = item.dataset.youtube;
    const link = item.dataset.link;

    document.getElementById("modalProjectTitle").innerText = title;
    document.getElementById("modalDescription").innerText = desc;
    document.getElementById("modalOpenLink").href = link || "#";

    const videoSection = document.getElementById("modalVideoSection");

    if (youtube) {
        const id = getYoutubeId(youtube);

        videoSection.innerHTML =
            `<iframe src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe>`;
        videoSection.style.display = "block";
    } else {
        videoSection.innerHTML = "";
        videoSection.style.display = "none";
    }

    overlay.style.display = "flex";
    document.body.style.overflow = "hidden";
}

function closeModal() {
    overlay.style.display = "none";
    document.body.style.overflow = "auto";
}

overlay.addEventListener("click", closeModal);

window.addEventListener("DOMContentLoaded", loadProjects);
</script>
