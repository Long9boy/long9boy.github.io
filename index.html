<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Long9boy | Portfolio</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<link rel="icon" type="image/x-icon" href="MyIcon.ico" />

<style>
html { scroll-behavior: smooth; }

body {
    margin: 0;
    font-family: "Courier New", monospace;
    background: black;
    color: #00ffcc;
    overflow-x: hidden;
}

/* HERO giữ nguyên */
.hero {
    position: relative;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: url("Background.png") center/cover fixed;
}
.hero::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,.5), rgba(0,0,0,.8), black);
}
.container { position: relative; z-index: 2; text-align: center; }

/* PROJECT LIST */

.projects-section {
    padding: 100px 20px;
}

.projects-list {
    max-width: 900px;
    margin: auto;
    background: #111;
    border-radius: 20px;
    padding: 10px;
}

/* layout: text trái - ảnh phải */
.project-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px;
    border-radius: 15px;
    cursor: pointer;
    transition: 0.3s;
    color: white;
}

.project-item:hover {
    background: #1a1a1a;
    transform: translateY(-5px);
}

.project-info {
    flex: 1;
    padding-right: 20px;
}

.project-info h3 {
    margin: 0;
}

/* description ellipsis */
.description {
    margin-top: 8px;
    font-family: "Times New Roman";
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

/* media bên phải */
.project-media {
    width: 180px;
    height: 100px;
    background: #000;
    border-radius: 10px;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
}

.project-media img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* MODAL */

.modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.8);
    backdrop-filter: blur(10px);
    display: none;
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: rgba(0,0,0,.6);
    padding: 20px;
    border-radius: 20px;
    max-width: 700px;
    width: 90%;
}

.modal-title {
    font-size: 1.5rem;
    color: #00ffcc;
    margin-bottom: 10px;
}

.modal-desc {
    margin-top: 10px;
    font-family: "Times New Roman";
}

.modal-video {
    width: 100%;
    aspect-ratio: 16/9;
    margin-top: 15px;
}

.modal-btn {
    display: inline-block;
    margin-top: 20px;
    padding: 10px 20px;
    background: #00ffcc;
    color: black;
    text-decoration: none;
    border-radius: 20px;
}
</style>
</head>

<body>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-title" id="mTitle"></div>
        <div id="mVideo"></div>
        <div class="modal-desc" id="mDesc"></div>
        <a id="mLink" class="modal-btn" target="_blank">OPEN</a>
    </div>
</div>

<div class="hero">
    <div class="container">
        <h1>Hi, I'm Long9boy</h1>
    </div>
</div>

<div class="projects-section">
    <div class="projects-list">

        <!-- 
        ===== HƯỚNG DẪN THÊM PROJECT =====
        data-youtube: link youtube (optional)
        data-img: link ảnh (optional)
        data-desc: mô tả (optional)
        data-link: link download hoặc project
        -->

        <div class="project-item"
            data-youtube="https://youtu.be/kFUL31ziGOI"
            data-desc="Addon Yasuo cực ngầu"
            data-link="https://google.com">

            <div class="project-info">
                <h3>Yasuo Addon</h3>
                <div class="description">Loading...</div>
            </div>

            <div class="project-media">
                <i class="fa-solid fa-image"></i>
            </div>
        </div>

    </div>
</div>

<script>
const modal = document.getElementById("modal");

document.querySelectorAll(".project-item").forEach(async item => {
    const yt = item.dataset.youtube;
    const imgBox = item.querySelector(".project-media");
    const descBox = item.querySelector(".description");

    if (yt) {
        const res = await fetch(`https://noembed.com/embed?url=${yt}`);
        const data = await res.json();

        imgBox.innerHTML = `<img src="${data.thumbnail_url}">`;

        descBox.innerHTML =
            `<b>${data.title}</b><br>` +
            (item.dataset.desc || "");
    }

    item.onclick = () => openModal(item);
});

function openModal(item){
    const yt = item.dataset.youtube;
    const title = item.querySelector("h3").innerText;

    document.getElementById("mTitle").innerText = title;
    document.getElementById("mDesc").innerText = item.dataset.desc || "";

    document.getElementById("mLink").href = item.dataset.link || "#";

    const video = document.getElementById("mVideo");

    if(yt){
        const id = yt.split("/").pop();
        video.innerHTML = `<iframe class="modal-video"
        src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe>`;
    } else {
        video.innerHTML = "";
    }

    modal.style.display = "flex";
}

modal.onclick = () => modal.style.display = "none";
</script>

</body>
</html>
