<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Long9boy | Portfolio</title> <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"> <link rel="icon" type="image/x-icon" href="MyIcon.ico"> <style> /* 1. CẤU HÌNH CHUNG */ html { scroll-behavior: smooth; } body { margin: 0; padding: 0; font-family: 'Courier New', monospace; background: black; color: #00ffcc; overflow-x: hidden; } /* 2. HERO SECTION (ẢNH NỀN) */ .hero { position: relative; height: 100vh; width: 100%; display: flex; justify-content: center; align-items: center; text-align: center; background-image: url('Background.png'); background-size: cover; background-position: center; background-attachment: fixed; } .hero::before { content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0; /* Hiệu ứng bóng râm nhìn vào, đen đậm 1/5 ở dưới */ background: linear-gradient(to bottom, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.7) 70%, black 100%); z-index: 1; } .container { position: relative; z-index: 2; } .typing { border-right: 3px solid #00ffcc; white-space: nowrap; overflow: hidden; animation: typing 3s steps(30), blink .7s infinite; margin: 0 auto 20px auto; width: fit-content; font-size: 2.5rem; } @keyframes typing { from { width: 0 } to { width: 100% } } @keyframes blink { 50% { border-color: transparent } } /* DOCK EFFECT - HIỆU ỨNG NÚT BẤM DẠT RA */ .links { display: flex; flex-direction: column; gap: 15px; margin-top: 30px; align-items: center; } .links a { display: flex; align-items: center; justify-content: center; color: #00ffcc; text-decoration: none; border: 1px solid #00ffcc; padding: 12px 25px; min-width: 220px; border-radius: 8px; background: rgba(0, 0, 0, 0.6); transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); transform-origin: center; cursor: pointer; } .links a i { margin-right: 12px; font-size: 1.3rem; transition: color 0.4s; } .fa-youtube { color: #ff0000; } .fa-discord { color: #5865F2; } .fa-code { color: #ffcc00; } /* 3. PROJECTS SECTION - CHỮ TRẮNG */ .projects-section { min-height: 100vh; display: flex; flex-direction: column; gap: 25px; align-items: center; background: black; padding: 100px 20px; box-sizing: border-box; } .projects-list { width: 100%; max-width: 1000px; background: #111111; border-radius: 24px; padding: 5px; box-shadow: 0 30px 60px rgba(0, 255, 204, 0.1); } .project-item { display: flex; align-items: center; gap: 30px; padding: 25px; transition: all 0.4s ease; border-radius: 18px; text-decoration: none; color: white; cursor: pointer; } .project-item:hover { background: #1a1a1a; transform: scale(1.02) translateY(-5px); } .project-media { width: 220px; height: 125px; flex-shrink: 0; background: #050505; border-radius: 12px; overflow: hidden; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(0, 255, 204, 0.1); } .project-media img { width: 100%; height: 100%; object-fit: cover; } .project-info h3 { margin: 0; font-size: 1.4rem; color: #ffffff !important; } .project-info .description { margin: 10px 0 0; font-size: 0.95rem; color: #ffffff !important; opacity: 0.8; line-height: 1.4; } /* 4. MODAL STYLE (DIALOG) */ .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(15px); display: none; justify-content: center; align-items: center; z-index: 9999; } .modal-content { background: transparent; width: 90%; max-width: 800px; padding: 20px; color: white; } .modal-video-container { width: 100%; aspect-ratio: 16/9; border-radius: 15px; overflow: hidden; background: #000; } .modal-video-container iframe { width: 100%; height: 100%; border: none; } .modal-btn { margin-top: 25px; padding: 12px 35px; background: #00ffcc; color: black; text-decoration: none; font-weight: bold; border-radius: 50px; display: inline-flex; align-items: center; gap: 10px; } </style> </head> <body> <div class="modal-overlay" id="modalOverlay"> <div class="modal-content" onclick="event.stopPropagation()"> <h2 id="modalProjectTitle" style="text-align:center; color:#00ffcc;">Project Title</h2> <div id="modalVideoSection" class="modal-video-container"></div> <p id="modalDescription" style="text-align:center; margin-top:15px; font-family: serif;"></p> <div style="text-align:center;"> <a href="#" target="_blank" class="modal-btn" id="modalOpenLink">DOWNLOAD / OPEN <i class="fa-solid fa-download"></i></a> </div> </div> </div> <div class="hero"> <div class="container"> <h1 class="typing">Hi, I'm Long9boy</h1> <p>Developer | Minecraft | Coding enthusiast</p> <div class="links" id="link-container"> <a href="https://www.youtube.com/@long9tpmcr" target="_blank"><i class="fa-brands fa-youtube"></i> YouTube</a> <a href="https://discord.gg/eD9726Vv" target="_blank"><i class="fa-brands fa-discord"></i> Discord</a> <a href="javascript:void(0)" class="scroll-link" data-target="projects"><i class="fa-solid fa-code"></i> Recent Projects</a> </div> </div> </div> <div id="projects" class="projects-section"> <div class="projects-list"> <div class="project-item yt-auto-full" data-youtube="https://youtu.be/kFUL31ziGOI" data-download="https://www.mediafire.com/file/bp6rsmdlgm1xue9/Yasuo_Nightbringer.mcaddon/file" onclick="handleProjectClick(this)"> <div class="project-media"><i class="fa-solid fa-circle-notch fa-spin"></i></div> <div class="project-info"> <h3>Yasuo Addon 1.21.15+</h3> <div class="description">Đang tải...</div> </div> </div> </div> <div class="projects-list"> <div class="project-item yt-auto-full" data-youtube="https://youtu.be/LULR6LoIOdM" data-download="LINK_TAI_CUA_BAN_TAI_DAY" onclick="handleProjectClick(this)"> <div class="project-media"><i class="fa-solid fa-circle-notch fa-spin"></i></div> <div class="project-info"> <h3>New Crate [v2] 1.21.30+</h3> <div class="description">Đang tải...</div> </div> </div> </div> </div> <script> // 1. TỰ ĐỘNG LẤY DATA YOUTUBE async function loadYouTubeData() { const items = document.querySelectorAll('.yt-auto-full'); for (const item of items) { const url = item.getAttribute('data-youtube'); try { const response = await fetch(`https://noembed.com/embed?url=${url}`); const data = await response.json(); if (data.title) { item.querySelector('.project-media').innerHTML = `<img src="${data.thumbnail_url}">`; item.querySelector('.description').innerText = data.title; // Lấy tiêu đề video làm mô tả } } catch (e) { console.error(e); } } } // 2. XỬ LÝ CLICK MỞ DIALOG (ĐÚNG DỰ ÁN) function handleProjectClick(el) { const title = el.querySelector('h3').innerText; const desc = el.querySelector('.description').innerText; const yt = el.getAttribute('data-youtube'); const dl = el.getAttribute('data-download'); document.getElementById('modalProjectTitle').innerText = title; document.getElementById('modalDescription').innerText = "Mô tả từ YouTube: " + desc; document.getElementById('modalOpenLink').href = dl; let videoId = yt.includes('v=') ? yt.split('v=')[1].split('&')[0] : yt.split('/').pop(); document.getElementById('modalVideoSection').innerHTML = `<iframe src="https://www.youtube.com/embed/${videoId}" allowfullscreen></iframe>`; document.getElementById('modalOverlay').style.display = 'flex'; document.body.style.overflow = 'hidden'; } // Đóng Modal khi bấm ra ngoài document.getElementById('modalOverlay').onclick = function() { this.style.display = 'none'; document.getElementById('modalVideoSection').innerHTML = ''; document.body.style.overflow = 'auto'; }; // 3. HIỆU ỨNG DOCK (DẠT NÚT) const linkContainer = document.getElementById('link-container'); const links = Array.from(linkContainer.querySelectorAll('a')); links.forEach((link, index) => { link.addEventListener('mousemove', () => { links.forEach((l, i) => { const dist = Math.abs(i - index); let scale = 1, opacity = 1, shift = 0; if (dist === 0) { scale = 1.3; l.style.background = "#00ffcc"; l.style.color = "black"; l.querySelector('i').style.color = "black"; } else { scale = dist === 1 ? 0.9 : 0.8; opacity = dist === 1 ? 0.6 : 0.3; shift = (i < index) ? -20 : 20; // Dạt lên trên hoặc xuống dưới l.style.background = "rgba(0,0,0,0.6)"; l.style.color = "#00ffcc"; resetIcon(l); } l.style.transform = `scale(${scale}) translateY(${shift}px)`; l.style.opacity = opacity; }); }); }); function resetIcon(el) { const icon = el.querySelector('i'); if(icon.classList.contains('fa-youtube')) icon.style.color = "#ff0000"; if(icon.classList.contains('fa-discord')) icon.style.color = "#5865F2"; if(icon.classList.contains('fa-code')) icon.style.color = "#ffcc00"; } linkContainer.addEventListener('mouseleave', () => { links.forEach(l => { l.style.transform = "scale(1) translateY(0px)"; l.style.opacity = "1"; l.style.background = "rgba(0,0,0,0.6)"; l.style.color = "#00ffcc"; resetIcon(l); }); }); // Cuộn mượt document.querySelectorAll('.scroll-link').forEach(link => { link.addEventListener('click', (e) => { const target = document.getElementById(link.getAttribute('data-target')); target.scrollIntoView({ behavior: 'smooth' }); }); }); window.addEventListener('DOMContentLoaded', loadYouTubeData); </script> </body> </html>
