<!DOCTYPE html>
<html lang="en">
<head> 
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Long9tpmcr</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="icon" type="image/x-icon" href="MyIcon.ico">

  <style>
    /* Hiệu ứng trượt mượt mà khi bấm link nội bộ */
    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: 'Courier New', monospace;
      background: black; /* Màu nền dự phòng nếu ảnh không load được */
      color: #00ffcc;
    }

    /* PHẦN NỀN CHÍNH (HERO SECTION) */
    .hero {
      position: relative;
      height: 100vh;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      
      /* Cấu hình ảnh nền Background.png */
      background-image: url('Background.png');
      background-size: cover;      /* Ảnh phủ kín màn hình */
      background-position: center; /* Ảnh luôn nằm giữa */
      background-attachment: fixed; /* Tạo hiệu ứng Parallax nhẹ khi cuộn */
    }

    /* LỚP PHỦ TỐI (OVERLAY) - Tạo cảm giác bóng râm và chia 5 phần */
    .hero::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      
      /* Gradient chia 5 phần: 
         - Trên cùng hơi tối (như bóng râm)
         - Ở giữa rõ ảnh hơn một chút
         - 1/5 cuối cùng (80% -> 100%) là màu đen đặc */
      background: linear-gradient(
        to bottom,
        rgba(0, 0, 0, 0.8) 0%,    /* 1/5 đầu: Tối nhiều (Bóng râm trên) */
        rgba(0, 0, 0, 0.4) 20%,   /* 2/5 -> 4/5: Ảnh hiện rõ dần */
        rgba(0, 0, 0, 0.4) 80%,   
        rgba(0, 0, 0, 1) 100%     /* 1/5 cuối: Đen hoàn toàn (Ranh giới) */
      );
      z-index: 1; /* Nằm trên ảnh nền nhưng dưới nội dung chữ */
    }

    /* Đảm bảo nội dung chữ luôn nằm trên lớp phủ tối */
    .container {
      position: relative;
      z-index: 2;
    }

    /* HIỆU ỨNG GÕ CHỮ */
    .typing {
      border-right: 2px solid #00ffcc;
      white-space: nowrap;
      overflow: hidden;
      animation: typing 3s steps(30), blink .7s infinite;
      margin: 0 auto 30px auto;
      width: fit-content; 
    }

    @keyframes typing { from { width: 0 } to { width: 100% } }
    @keyframes blink { 50% { border-color: transparent } }

    /* DANH SÁCH CÁC NÚT BẤM */
    .links {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .links a {
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
      color: #00ffcc;
      text-decoration: none;
      border: 1px solid #00ffcc;
      padding: 12px 25px;
      min-width: 220px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.3); /* Nền nút hơi trong suốt để thấy ảnh */
      transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
    }

    /* Hiệu ứng trỏ chuột iPhone-style (Đã xử lý bằng JS ở dưới) */
    .links a.hover-large { transform: scale(1.25); background: #00ffcc; color: black; opacity: 1; z-index: 10; box-shadow: 0 0 25px rgba(0, 255, 204, 0.5); }
    .links a.hover-medium { transform: scale(0.95); opacity: 0.6; }
    .links a.hover-small { transform: scale(0.8); opacity: 0.3; }

    .links a i { margin-right: 12px; font-size: 1.3rem; }
    .icon-yt { color: #FF0000; }
    .icon-discord { color: #5865F2; }
    .icon-project { color: #f1c40f; }
    
    .links a.hover-large i { color: black; }

    /* PHẦN NỘI DUNG PROJECTS PHÍA DƯỚI */
    .projects-section {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: black; /* Tiếp nối phần màu đen 1/5 của ảnh trên */
    }
  </style>
</head>
<body>

<div class="hero">
  <div class="container">
    <h1 class="typing">Hi, I'm Long9tpmcr</h1>
    <p style="margin-bottom: 30px;">Developer | Minecraft | Coding</p>

    <div class="links" id="link-container">
      <a href="https://www.youtube.com/@long9tpmcr" target="_blank" rel="noopener noreferrer">
        <i class="fa-brands fa-youtube icon-yt"></i> YouTube
      </a>

      <a href="https://discord.gg/eD9726Vv" target="_blank" rel="noopener noreferrer">
        <i class="fa-brands fa-discord icon-discord"></i> Discord
      </a>

      <a href="#projects">
        <i class="fa-solid fa-code icon-project"></i> Recent Project
      </a>
    </div>
  </div>
</div>

<div id="projects" class="projects-section">
  <h2 style="font-size: 2.5rem;">My Recent Projects</h2>
  <p>Khám phá các dự án Minecraft và Coding của mình bên dưới.</p>
</div>

<script>
  // SCRIPT XỬ LÝ HIỆU ỨNG TRỎ CHUỘT PHÓNG TO/THU NHỎ BẬC THANG
  const container = document.getElementById('link-container');
  const links = Array.from(container.querySelectorAll('a'));

  links.forEach((link, index) => {
    link.addEventListener('mouseenter', () => {
      links.forEach((l, i) => {
        const distance = Math.abs(i - index); // Khoảng cách giữa các nút
        l.classList.remove('hover-large', 'hover-medium', 'hover-small');
        
        if (distance === 0) l.classList.add('hover-large');     // Nút đang chọn
        else if (distance === 1) l.classList.add('hover-medium'); // Nút kế bên
        else l.classList.add('hover-small');                    // Nút ở xa
      });
    });
  });

  // Khi rời chuột ra khỏi vùng chứa thì trả về trạng thái bình thường
  container.addEventListener('mouseleave', () => {
    links.forEach(l => l.classList.remove('hover-large', 'hover-medium', 'hover-small'));
  });
</script>

</body>
</html>
