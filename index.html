<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Long9boy | Portfolio</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
html { scroll-behavior: smooth; }

body {
  margin: 0;
  font-family: 'Courier New', monospace;
  background: black;
  color: #00ffcc;
}

/* HERO */
.hero {
  position: relative;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: url('Background.png') center/cover fixed;
}
.hero::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, rgba(0,0,0,0.5), black);
}
.container { position: relative; z-index: 2; text-align:center; }

.typing {
  border-right: 3px solid #00ffcc;
  white-space: nowrap;
  overflow: hidden;
  animation: typing 3s steps(30), blink .7s infinite;
  font-size: 2.5rem;
}
@keyframes typing { from { width:0 } to { width:100% } }
@keyframes blink { 50% { border-color: transparent } }

/* PROJECT */
.projects-section {
  padding: 100px 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.projects-list {
  width: 100%;
  max-width: 1000px;
  background: #111;
  border-radius: 20px;
  padding: 10px;
}

.project-item {
  display: flex;
  gap: 20px;
  padding: 20px;
  border-radius: 15px;
  cursor: pointer;
  transition: 0.3s;
}
.project-item:hover {
  background: #1a1a1a;
  transform: translateY(-5px);
}

.project-media {
  width: 200px;
  height: 120px;
  background: #000;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.project-media img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.project-media i {
  font-size: 2rem;
  opacity: 0.5;
}

.project-info h3 {
  margin: 0;
  color: white;
}

/* ✨ DESCRIPTION FIX */
.description {
  margin-top: 8px;
  color: white;
  opacity: 0.7;

  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;

  white-space: pre-line; /* xuống dòng */
}

/* MODAL */
.modal-overlay {
  position: fixed;
  inset: 0;
  display: none;
  justify-content: center;
  align-items: center;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  z-index: 9999;
}

.modal-content {
  width: 90%;
  max-width: 800px;
  background: rgba(0,0,0,0.5);
  border-radius: 20px;
  padding: 20px;
  color: white;
}

.modal-video-container {
  width: 100%;
  aspect-ratio: 16/9;
  border-radius: 10px;
  overflow: hidden;
  margin: 10px 0;
}

.modal-video-container iframe {
  width: 100%;
  height: 100%;
  border: none;
}

.modal-btn {
  margin-top: 10px;
  padding: 10px 20px;
  background: #00ffcc;
  color: black;
  border-radius: 30px;
  cursor: pointer;
  display: inline-block;
}
</style>
</head>

<body>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-content" onclick="event.stopPropagation()">
    <h2 id="modalProjectTitle"></h2>
    <div id="modalVideoSection" class="modal-video-container"></div>
    <p id="modalDescription"></p>
    <div class="modal-btn" id="modalOpenLink">OPEN</div>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <div class="container">
    <h1 class="typing">Hi, I'm Long9boy</h1>
  </div>
</div>

<!-- PROJECT -->
<div class="projects-section">

  <div class="projects-list">
    <div class="project-item"
      data-youtube="https://youtu.be/LULR6LoIOdM"
      data-download="https://example.com"
      onclick="handleProjectClick(this)">
      <div class="project-media"></div>
      <div class="project-info">
        <h3>New Crate [v2] 1.21.30+</h3>
        <div class="description"></div>
      </div>
    </div>
  </div>

</div>

<script>
async function loadYouTubeData() {
  const items = document.querySelectorAll('.project-item');

  for (const item of items) {
    const yt = item.getAttribute('data-youtube');
    const media = item.querySelector('.project-media');
    const descBox = item.querySelector('.description');

    media.innerHTML = `<i class="fa-solid fa-image"></i>`;

    if (!yt) continue;

    try {
      let id = yt.includes('v=')
        ? yt.split('v=')[1].split('&')[0]
        : yt.split('/').pop();

      // thumbnail
      media.innerHTML = `<img src="https://img.youtube.com/vi/${id}/hqdefault.jpg">`;

      // lấy title + description
      const res = await fetch(`https://yt.lemnoslife.com/noKey/videos?part=snippet&id=${id}`);
      const data = await res.json();
      const snippet = data.items[0].snippet;

      let text = snippet.title;

      if (snippet.description) {
        text += "\n" + snippet.description;
      }

      descBox.innerText = text;

    } catch (e) {
      console.error(e);
    }
  }
}

function handleProjectClick(el) {
  const title = el.querySelector('h3').innerText;
  const desc = el.querySelector('.description').innerText;
  const yt = el.getAttribute('data-youtube');
  const dl = el.getAttribute('data-download');

  document.getElementById('modalProjectTitle').innerText = title;
  document.getElementById('modalDescription').innerText = desc;

  const videoBox = document.getElementById('modalVideoSection');
  videoBox.innerHTML = "";

  if (yt) {
    let id = yt.includes('v=')
      ? yt.split('v=')[1].split('&')[0]
      : yt.split('/').pop();

    videoBox.innerHTML = `<iframe src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe>`;
  }

  document.getElementById('modalOpenLink').onclick = () => {
    window.open(dl, "_blank");
  };

  document.getElementById('modalOverlay').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

document.getElementById('modalOverlay').onclick = function() {
  this.style.display = 'none';
  document.getElementById('modalVideoSection').innerHTML = '';
  document.body.style.overflow = 'auto';
};

window.addEventListener('DOMContentLoaded', loadYouTubeData);
</script>

</body>
</html>
