<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Long9boy | Portfolio</title>
        
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
        <link rel="icon" type="image/x-icon" href="MyIcon.ico" />

        <style>
            /* 1. CẤU HÌNH CHUNG */
            html {
                scroll-behavior: smooth;
            }

            body {
                margin: 0;
                padding: 0;
                font-family: "Courier New", monospace;
                background: black;
                color: #00ffcc;
                overflow-x: hidden;
            }

            /* 2. HERO SECTION */
            .hero {
                position: relative;
                height: 100vh;
                width: 100%;
                display: flex;
                justify-content: center;
                align-items: center;
                text-align: center;
                background-image: url("Background.png");
                background-size: cover;
                background-position: center;
                background-attachment: fixed;
            }

            .hero::before {
                content: "";
                position: absolute;
                top: 0; left: 0; right: 0; bottom: 0;
                background: linear-gradient(to bottom, rgba(0, 0, 0, 0.5) 0%, rgba(0, 0, 0, 0.8) 80%, black 100%);
                z-index: 1;
            }

            .container {
                position: relative;
                z-index: 2;
                width: 100%;
            }

            /* TYPING ANIMATION STYLE */
            .typing-container {
                min-height: 80px; /* Giữ chỗ cố định để các phần tử bên dưới không bị nhảy khi xóa chữ */
                display: flex;
                justify-content: center;
                align-items: center;
                margin-bottom: 10px;
            }

            .typing {
                font-size: 2.5rem;
                font-weight: bold;
                border-right: 3px solid #00ffcc;
                white-space: nowrap;
                overflow: hidden;
                display: inline-block;
                animation: blink 0.7s infinite;
            }

            @keyframes blink {
                50% { border-color: transparent; }
            }

            /* DOCK LINKS EFFECT */
            .links {
                display: flex;
                flex-direction: column;
                gap: 15px;
                margin-top: 30px;
                align-items: center;
            }

            .links a {
                display: flex;
                align-items: center;
                justify-content: center;
                color: #00ffcc;
                text-decoration: none;
                border: 1px solid #00ffcc;
                padding: 12px 25px;
                min-width: 250px;
                border-radius: 8px;
                background: rgba(0, 0, 0, 0.6);
                transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
                cursor: pointer;
            }

            .links a i {
                margin-right: 12px;
                font-size: 1.3rem;
            }

            .fa-youtube { color: #ff0000; }
            .fa-discord { color: #5865f2; }
            .fa-code { color: #ffcc00; }

            /* 3. PROJECTS SECTION */
            .projects-section {
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                background: black;
                padding: 100px 20px;
            }

            .projects-list {
                width: 100%;
                max-width: 1000px;
                background: #111111;
                border-radius: 24px;
                padding: 15px;
                margin-bottom: 25px;
                box-shadow: 0 30px 60px rgba(0, 255, 204, 0.1);
            }

            .project-item {
                display: flex;
                align-items: center;
                gap: 25px;
                padding: 20px;
                transition: all 0.4s ease;
                border-radius: 18px;
                text-decoration: none;
                color: white;
            }

            .project-item:hover {
                background: #1a1a1a;
                transform: scale(1.02) translateY(-5px);
            }

            .project-media {
                width: 200px;
                height: 110px;
                flex-shrink: 0;
                background: #000;
                border-radius: 10px;
                overflow: hidden;
                display: flex;
                align-items: center;
                justify-content: center;
                border: 1px solid rgba(0, 255, 204, 0.2);
            }

            .project-media img { width: 100%; height: 100%; object-fit: cover; }

            .project-info h3 { margin: 0; color: #00ffcc; }
            .project-info .description {
                font-size: 0.9rem;
                margin-top: 8px;
                color: #ccc;
                font-family: serif;
            }

            /* 4. MODAL STYLE */
            .modal-overlay {
                position: fixed;
                top: 0; left: 0; width: 100%; height: 100%;
                background: rgba(0, 0, 0, 0.9);
                backdrop-filter: blur(10px);
                display: none;
                justify-content: center;
                align-items: center;
                z-index: 9999;
            }

            .modal-content {
                width: 90%; max-width: 700px;
                text-align: center;
            }

            .modal-video-container {
                width: 100%; aspect-ratio: 16/9;
                border-radius: 15px; overflow: hidden;
                box-shadow: 0 0 30px #00ffcc44;
            }

            .modal-video-container iframe { width: 100%; height: 100%; border: none; }

            .modal-btn {
                display: inline-block;
                margin-top: 25px;
                padding: 12px 40px;
                background: #00ffcc;
                color: black;
                text-decoration: none;
                font-weight: bold;
                border-radius: 50px;
                transition: 0.3s;
            }

            .modal-btn:hover { transform: scale(1.1); box-shadow: 0 0 20px #00ffcc; }
        </style>
    </head>

    <body>
        <div class="modal-overlay" id="modalOverlay">
            <div class="modal-content" onclick="event.stopPropagation()">
                <h2 id="modalProjectTitle" style="color: #00ffcc;">Project</h2>
                <div id="modalVideoSection" class="modal-video-container"></div>
                <p id="modalDescription" style="color: #eee; margin-top: 15px; font-family: serif;"></p>
                <a href="#" target="_blank" class="modal-btn" id="modalOpenLink">OPEN LINK</a>
            </div>
        </div>

        <div class="hero">
            <div class="container">
                <div class="typing-container">
                    <h1 class="typing" id="typing-text"></h1>
                </div>
                <p style="opacity: 0.8;">Developer | Minecraft | Coding enthusiast</p>

                <div class="links" id="link-container">
                    <a href="https://www.youtube.com/@long9tpmcr" target="_blank"><i class="fa-brands fa-youtube"></i> YouTube</a>
                    <a href="https://discord.gg/eD9726Vv" target="_blank"><i class="fa-brands fa-discord"></i> Discord</a>
                    <a href="javascript:void(0)" class="scroll-link" data-target="projects"><i class="fa-solid fa-code"></i> Recent Projects</a>
                </div>
            </div>
        </div>

        <div id="projects" class="projects-section">
            
            <div class="projects-list">
                <div class="project-item yt-auto-full" data-youtube="https://youtu.be/kFUL31ziGOI" 
                     onclick="openModal('Yasuo Addon 1.21.15+', 'Review Yasuo Nightbringer addon.', 'https://youtu.be/kFUL31ziGOI', 'https://www.mediafire.com/file/bp6rsmdlgm1xue9/Yasuo_Nightbringer.mcaddon/file')">
                    <div class="project-media"><i class="fa-solid fa-circle-notch fa-spin"></i></div>
                    <div class="project-info">
                        <h3>Yasuo Addon 1.21.15+</h3>
                        <div class="description">Đang tải...</div>
                    </div>
                </div>
            </div>

            <div class="projects-list">
                <div class="project-item yt-auto-full" data-youtube="https://youtu.be/LULR6LoIOdM" 
                     onclick="openModal('New Crate [v2]', 'Cập nhật hệ thống Crate mới nhất.', 'https://youtu.be/LULR6LoIOdM', '#')">
                    <div class="project-media"><i class="fa-solid fa-circle-notch fa-spin"></i></div>
                    <div class="project-info">
                        <h3>New Crate [v2] 1.21.30+</h3>
                        <div class="description">Đang tải...</div>
                    </div>
                </div>
            </div>
        </div>

        <script>
            // 1. TYPING EFFECT LOGIC
            const textElement = document.getElementById("typing-text");
            const phrases = ["Hi, I'm Long9boy", "Welcome to my link bio"];
            let pIdx = 0, cIdx = 0, isDeleting = false;

            function typeEffect() {
                const current = phrases[pIdx];
                textElement.textContent = isDeleting ? current.substring(0, cIdx - 1) : current.substring(0, cIdx + 1);
                cIdx = isDeleting ? cIdx - 1 : cIdx + 1;

                let speed = isDeleting ? 60 : 120; // Tốc độ xóa nhanh hơn tốc độ viết

                if (!isDeleting && cIdx === current.length) {
                    isDeleting = true;
                    speed = 5000; // NGHỈ 5 GIÂY SAU KHI VIẾT XONG
                } else if (isDeleting && cIdx === 0) {
                    isDeleting = false;
                    pIdx = (pIdx + 1) % phrases.length;
                    speed = 500;
                }
                setTimeout(typeEffect, speed);
            }

            // 2. MODAL LOGIC
            const overlay = document.getElementById("modalOverlay");
            function openModal(title, desc, yt, dl) {
                document.getElementById("modalProjectTitle").innerText = title;
                document.getElementById("modalDescription").innerText = desc;
                document.getElementById("modalOpenLink").href = dl || "#";
                const videoSect = document.getElementById("modalVideoSection");
                
                if (yt) {
                    let id = yt.includes("v=") ? yt.split("v=")[1].split("&")[0] : yt.split("/").pop();
                    videoSect.innerHTML = `<iframe src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe>`;
                    videoSect.style.display = "block";
                } else { videoSect.style.display = "none"; }
                
                overlay.style.display = "flex";
                document.body.style.overflow = "hidden";
            }

            overlay.addEventListener("click", () => {
                overlay.style.display = "none";
                document.getElementById("modalVideoSection").innerHTML = "";
                document.body.style.overflow = "auto";
            });

            // 3. YOUTUBE DATA LOAD
            async function loadYT() {
                const items = document.querySelectorAll(".yt-auto-full");
                for (const item of items) {
                    const url = item.getAttribute("data-youtube");
                    try {
                        const res = await fetch(`https://noembed.com/embed?url=${url}`);
                        const data = await res.json();
                        if (data.title) {
                            item.querySelector(".project-media").innerHTML = `<img src="${data.thumbnail_url}">`;
                            item.querySelector(".description").innerText = data.title;
                        }
                    } catch (e) { console.error("YT Load Error"); }
                }
            }

            // 4. DOCK EFFECT
            const linkBox = document.getElementById("link-container");
            const btns = Array.from(linkBox.querySelectorAll("a"));

            btns.forEach((btn, idx) => {
                btn.addEventListener("mousemove", () => {
                    btns.forEach((b, i) => {
                        const dist = Math.abs(i - idx);
                        if (dist === 0) {
                            b.style.transform = "scale(1.2) translateY(0px)";
                            b.style.background = "#00ffcc"; b.style.color = "black";
                            b.querySelector("i").style.color = "black";
                        } else {
                            const shift = i < idx ? -15 : 15;
                            b.style.transform = `scale(0.9) translateY(${shift * (2-dist)}px)`;
                            b.style.opacity = "0.5";
                        }
                    });
                });
            });

            linkBox.addEventListener("mouseleave", () => {
                btns.forEach(b => {
                    b.style.transform = "scale(1) translateY(0)";
                    b.style.opacity = "1"; b.style.background = "rgba(0,0,0,0.6)"; b.style.color = "#00ffcc";
                    const icon = b.querySelector("i");
                    if(icon.classList.contains("fa-youtube")) icon.style.color="#ff0000";
                    if(icon.classList.contains("fa-discord")) icon.style.color="#5865f2";
                    if(icon.classList.contains("fa-code")) icon.style.color="#ffcc00";
                });
            });

            // 5. SCROLL LINK
            document.querySelectorAll(".scroll-link").forEach(l => {
                l.addEventListener("click", function() {
                    document.getElementById(this.dataset.target).scrollIntoView({behavior: "smooth"});
                });
            });

            // INIT
            window.addEventListener("DOMContentLoaded", () => {
                typeEffect();
                loadYT();
            });
        </script>
    </body>
</html>
