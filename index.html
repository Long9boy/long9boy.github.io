<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: monospace;
}

/* PROJECT */
.projects {
  max-width: 900px;
  margin: auto;
  padding: 50px 20px;
}

.project {
  display: flex;
  gap: 20px;
  padding: 20px;
  margin-bottom: 15px;
  background: #111;
  border-radius: 15px;
  cursor: pointer;
  transition: .3s;
}
.project:hover {
  background: #1a1a1a;
}

.media {
  width: 200px;
  height: 120px;
  background: #000;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.media img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.media i {
  font-size: 2rem;
  opacity: .4;
}

/* TEXT */
.info h3 {
  margin: 0;
}

.desc {
  margin-top: 8px;
  opacity: .7;

  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;

  white-space: pre-line;
}

/* MODAL */
.modal {
  position: fixed;
  inset: 0;
  display: none;
  justify-content: center;
  align-items: center;
  background: rgba(0,0,0,.6);
  backdrop-filter: blur(10px);
}

.modal-box {
  width: 90%;
  max-width: 700px;
  background: rgba(0,0,0,.5);
  border-radius: 20px;
  padding: 20px;
}

.video {
  width: 100%;
  aspect-ratio: 16/9;
  margin: 10px 0;
}
.video iframe {
  width: 100%;
  height: 100%;
  border: none;
}

.btn {
  display: inline-block;
  margin-top: 10px;
  padding: 10px 20px;
  background: #00ffcc;
  color: black;
  border-radius: 30px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="projects">

  <!-- PROJECT -->
  <div class="project"
    data-youtube="https://youtu.be/LULR6LoIOdM"
    data-download="https://example.com"
    onclick="openProject(this)">

    <div class="media"></div>

    <div class="info">
      <h3>New Crate [v2]</h3>
      <div class="desc"></div>
    </div>

  </div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box" onclick="event.stopPropagation()">
    <h2 id="mTitle"></h2>
    <div id="mVideo" class="video"></div>
    <p id="mDesc"></p>
    <div class="btn" id="mBtn">OPEN</div>
  </div>
</div>

<script>
async function load() {
  const items = document.querySelectorAll('.project');

  for (const el of items) {
    const yt = el.dataset.youtube;
    const media = el.querySelector('.media');
    const desc = el.querySelector('.desc');

    media.innerHTML = `<i class="fa-solid fa-image"></i>`;

    if (!yt) continue;

    let id = yt.includes('v=') ? yt.split('v=')[1] : yt.split('/').pop();

    // thumbnail
    media.innerHTML = `<img src="https://img.youtube.com/vi/${id}/hqdefault.jpg">`;

    // lấy title + description
    const res = await fetch(`https://yt.lemnoslife.com/noKey/videos?part=snippet&id=${id}`);
    const data = await res.json();
    const s = data.items[0].snippet;

    desc.innerText = s.title + "\n" + s.description;
  }
}

function openProject(el) {
  const yt = el.dataset.youtube;
  const link = el.dataset.download;

  const title = el.querySelector('h3').innerText;
  const desc = el.querySelector('.desc').innerText;

  document.getElementById('mTitle').innerText = title;
  document.getElementById('mDesc').innerText = desc;

  const video = document.getElementById('mVideo');
  video.innerHTML = "";

  if (yt) {
    let id = yt.includes('v=') ? yt.split('v=')[1] : yt.split('/').pop();
    video.innerHTML = `<iframe src="https://www.youtube.com/embed/${id}"></iframe>`;
  }

  document.getElementById('mBtn').onclick = () => window.open(link);

  document.getElementById('modal').style.display = "flex";
}

document.getElementById('modal').onclick = function () {
  this.style.display = "none";
  document.getElementById('mVideo').innerHTML = "";
};

window.onload = load;
</script>

</body>
</html>
