<!DOCTYPE html>
<html lang="en">
<head> 
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Long9boy | Portfolio</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    html { scroll-behavior: smooth; }
    body {
      margin: 0; padding: 0;
      font-family: 'Courier New', monospace;
      background: black; color: #00ffcc;
      overflow-x: hidden;
    }

    /* HERO SECTION */
    .hero {
      position: relative; height: 100vh; width: 100%;
      display: flex; justify-content: center; align-items: center; text-align: center;
      background: linear-gradient(to bottom, rgba(0,0,0,0.5), black);
    }
    .container { position: relative; z-index: 2; }

    /* DOCK EFFECT - FIX MÀU & ICON */
    .links { display: flex; flex-direction: column; gap: 20px; margin-top: 30px; align-items: center; }
    .links a {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      color: #00ffcc; text-decoration: none;
      border: 1px solid #00ffcc; padding: 12px 25px; min-width: 220px;
      border-radius: 8px; background: rgba(0, 0, 0, 0.6);
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); 
      transform-origin: center; cursor: pointer;
    }
    /* Đảm bảo icon luôn có màu cyan trừ khi nút chuyển màu đen */
    .links a i { color: #00ffcc; transition: color 0.4s; }

    /* PROJECTS SECTION */
    .projects-section {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; background: black; padding: 100px 20px;
    }
    .projects-list {
      width: 100%; max-width: 1000px;
      background: #111111; border-radius: 24px; padding: 15px;
    }
    .project-item {
      display: flex; align-items: center; gap: 30px; padding: 25px;
      border-bottom: 1px solid rgba(0, 255, 204, 0.1);
      text-decoration: none; color: white !important; cursor: pointer;
    }
    .project-media img { width: 220px; border-radius: 12px; }
    .project-info h3 { margin: 0; color: white !important; }
    .project-info .description { color: white !important; margin-top: 10px; font-size: 0.9rem; }

    /* DIALOG TRONG SUỐT */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(15px);
      display: none; justify-content: center; align-items: center; z-index: 9999;
    }
  </style>
</head>
<body>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-content" style="width:90%; max-width:800px; color:white; text-align:center;">
    <h2 id="modalProjectTitle" style="color:#00ffcc;"></h2>
    <div id="modalVideoSection" style="aspect-ratio:16/9; background:#000; border-radius:15px; overflow:hidden;"></div>
    <p id="modalDescription" style="margin-top:20px;"></p>
    <button onclick="document.getElementById('modalOverlay').style.display='none'" style="margin-top:20px; padding:10px 20px; background:#00ffcc; border:none; border-radius:20px; cursor:pointer;">Close</button>
  </div>
</div>

<div class="hero">
  <div class="container">
    <h1>Hi, I'm Long9boy</h1>
    <div class="links" id="link-container">
      <a href="#"><i class="fa-brands fa-youtube"></i> YouTube</a>
      <a href="#"><i class="fa-brands fa-discord"></i> Discord</a>
      <a href="javascript:void(0)" class="scroll-link"><i class="fa-solid fa-code"></i> Recent Projects</a>
    </div>
  </div>
</div>

<div id="projects" class="projects-section">
  <div class="projects-list">
    <div class="project-item" onclick="openModal('Yasuo Addon', 'I created an addon about Yasuo!', 'kFUL31ziGOI')">
      <div class="project-media"><img src="https://img.youtube.com/vi/kFUL31ziGOI/mqdefault.jpg" alt="thumb"></div>
      <div class="project-info">
        <h3>Yasuo Addon 1.21.15+</h3>
        <div class="description">I created an addon about the champion Yasuo in League of Legends!</div>
      </div>
    </div>
  </div>
</div>

<script>
  const lnks = Array.from(document.querySelectorAll('.links a'));

  lnks.forEach((link, idx) => {
    link.addEventListener('mouseenter', () => {
      lnks.forEach((l, i) => {
        const dist = Math.abs(i - idx);
        
        // Reset trạng thái cho tất cả các nút trước khi áp dụng hiệu ứng mới
        l.style.background = "rgba(0, 0, 0, 0.6)";
        l.style.color = "#00ffcc";
        const icon = l.querySelector('i');
        if(icon) icon.style.color = "#00ffcc";

        if (dist === 0) {
          l.style.transform = "scale(1.3)";
          l.style.opacity = "1";
          l.style.background = "#00ffcc"; // Chuyển xanh khi trỏ vào
          l.style.color = "black";        // Chữ đen cho nổi
          if(icon) icon.style.color = "black"; // Icon đen cho nổi
        } else if (dist === 1) {
          l.style.transform = "scale(0.9)";
          l.style.opacity = "0.7";
        } else {
          l.style.transform = "scale(0.8)";
          l.style.opacity = "0.4";
        }
      });
    });
  });

  // Khi rời chuột khỏi toàn bộ khu vực Dock
  document.getElementById('link-container').addEventListener('mouseleave', () => {
    lnks.forEach(l => {
      l.style.transform = "scale(1)";
      l.style.opacity = "1";
      l.style.background = "rgba(0, 0, 0, 0.6)";
      l.style.color = "#00ffcc";
      const icon = l.querySelector('i');
      if(icon) icon.style.color = "#00ffcc";
    });
  });

  function openModal(title, desc, vId) {
    document.getElementById('modalProjectTitle').innerText = title;
    document.getElementById('modalDescription').innerText = desc;
    document.getElementById('modalVideoSection').innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${vId}" frameborder="0" allowfullscreen></iframe>`;
    document.getElementById('modalOverlay').style.display = 'flex';
  }

  document.querySelector('.scroll-link').onclick = () => {
    document.getElementById('projects').scrollIntoView({ behavior: 'smooth' });
  };
</script>
</body>
</html>
