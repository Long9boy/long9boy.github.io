<!DOCTYPE html>
<html lang="en">
<head> 
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Long9tpmcr</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="icon" type="image/x-icon" href="MyIcon.ico">

  <style>
    body {
      margin: 0;
      font-family: 'Courier New', monospace;
      background: black;
      color: #00ffcc;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .container { text-align: center; }

    .typing {
      border-right: 2px solid #00ffcc;
      white-space: nowrap;
      overflow: hidden;
      animation: typing 3s steps(30), blink .7s infinite;
      margin: 0 auto 20px auto;
      width: fit-content; 
    }

    @keyframes typing { from { width: 0 } to { width: 100% } }
    @keyframes blink { 50% { border-color: transparent } }

    /* Cấu hình khu vực bao quanh các nút */
    .links {
      display: flex;
      flex-direction: column;
      gap: 10px; /* Tạo khoảng cách đều giữa các nút */
    }

    .links a {
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
      color: #00ffcc;
      text-decoration: none;
      border: 1px solid #00ffcc;
      padding: 12px 25px;
      min-width: 220px;
      border-radius: 8px;
      
      /* Animation mượt mà kiểu iPhone */
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    /* 1. Khi một nút bất kỳ được trỏ vào: Tất cả nút trong group sẽ thu nhỏ lại */
    .links:hover a {
      transform: scale(0.9) translateY(5px);
      opacity: 0.6;
    }

    /* 2. Nút đang trực tiếp được trỏ chuột: Phóng to lên */
    .links a:hover {
      background: #00ffcc;
      color: black;
      transform: scale(1.15) translateY(0) !important;
      opacity: 1 !important;
      box-shadow: 0 10px 20px rgba(0, 255, 204, 0.3);
      z-index: 10;
    }

    /* 3. Hiệu ứng bậc thang: Các nút nằm SAU nút đang hover sẽ bị đẩy xuống và thu nhỏ hơn chút nữa */
    .links a:hover ~ a {
      transform: scale(0.85) translateY(15px);
      opacity: 0.4;
    }

    .links a i {
      margin-right: 12px;
      font-size: 1.3rem;
      transition: 0.3s;
    }

    .icon-yt { color: #FF0000; }
    .icon-kofi { color: #FF5E5B; }
    .icon-discord { color: #5865F2; }

    .links a:hover i {
      color: black;
    }
  </style>
</head>
<body>

<div class="container">
  <h1 class="typing">Hi, I'm Long9tpmcr</h1>
  <p style="margin-bottom: 30px;">Developer | Minecraft | Coding</p>

  <div class="links">
    <a href="https://www.youtube.com/@long9tpmcr" target="_blank" rel="noopener noreferrer">
      <i class="fa-brands fa-youtube icon-yt"></i> YouTube
    </a>

    <a href="#" target="_blank" rel="noopener noreferrer">
      <i class="fa-solid fa-mug-hot icon-kofi"></i> Ko-fi
    </a>

    <a href="#" target="_blank" rel="noopener noreferrer">
      <i class="fa-brands fa-discord icon-discord"></i> Discord
    </a>
  </div>
</div>

</body>
</html>
