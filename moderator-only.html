<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restricted Area | Moderator Only</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background: #0a0a0a;
            color: #00ffcc;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .login-box {
            border: 1px solid #00ffcc;
            padding: 40px;
            border-radius: 15px;
            background: rgba(0, 255, 204, 0.05);
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.2);
            text-align: center;
            width: 350px;
        }

        h2 { margin-bottom: 25px; font-size: 1.2rem; letter-spacing: 2px; }

        input {
            background: transparent;
            border: 1px solid #00ffcc;
            color: #00ffcc;
            padding: 12px;
            width: 100%;
            box-sizing: border-box;
            border-radius: 5px;
            outline: none;
            text-align: center;
            margin-bottom: 20px;
        }

        button {
            background: #00ffcc;
            color: black;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            transition: 0.3s;
        }

        button:hover {
            background: #00cca3;
            box-shadow: 0 0 15px #00ffcc;
        }

        #error-msg {
            color: #ff4444;
            font-size: 0.8rem;
            margin-top: 15px;
            display: none;
        }

        /* Trang nội dung bí mật (ẩn lúc đầu) */
        #secret-content { display: none; text-align: left; }
    </style>
</head>
<body>

    <div class="login-box" id="auth-box">
        <i class="fa-solid fa-user-shield" style="font-size: 3rem; margin-bottom: 20px;"></i>
        <h2>MODERATOR ONLY</h2>
        <input type="password" id="passphrase" placeholder="Enter Access Key...">
        <button onclick="checkAccess()">ACCESS SYSTEM</button>
        <p id="error-msg">ACCESS DENIED: Invalid Credentials</p>
    </div>

    <div id="secret-content" class="login-box" style="width: 80%; max-width: 800px;">
        <h2>WELCOME, LONG9BOY</h2>
        <hr border="1" color="#00ffcc">
        <div style="margin-top: 20px;">
            <p>> System Status: <span style="color: white;">Online</span></p>
            <p>> Access Level: <span style="color: white;">Root/Moderator</span></p>
            <p>> Admin Tools:</p>
            <ul>
                <li><a href="#" style="color: #00ffcc;">Edit Database</a></li>
                <li><a href="#" style="color: #00ffcc;">User Management</a></li>
                <li><a href="#" style="color: #00ffcc;">Server Logs</a></li>
            </ul>
        </div>
        <button onclick="location.reload()" style="margin-top: 20px; width: auto;">LOGOUT</button>
    </div>

    <script>
        // Mật khẩu đã được mã hóa theo dạng Base64 để người xem F12 không thấy ngay mật khẩu thật
        // Mật khẩu hiện tại là: admin123
        const KEY_HASH = "YWRtaW4xMjM="; 

        function checkAccess() {
            const input = document.getElementById('passphrase').value;
            const error = document.getElementById('error-msg');
            
            // Mã hóa input người dùng nhập vào để so sánh
            const encodedInput = btoa(input);

            if (encodedInput === KEY_HASH) {
                // Nếu đúng: Ẩn box login, hiện nội dung bí mật
                document.getElementById('auth-box').style.display = 'none';
                document.getElementById('secret-content').style.display = 'block';
                
                // Hiệu ứng âm thanh hoặc thông báo nếu muốn
                console.log("Access Granted.");
            } else {
                // Nếu sai: Hiện lỗi
                error.style.display = 'block';
                document.getElementById('passphrase').value = '';
                
                // Hiệu ứng rung box
                const box = document.getElementById('auth-box');
                box.style.animation = "shake 0.2s ease-in-out 0s 2";
            }
        }

        // Cho phép nhấn Enter để đăng nhập
        document.getElementById('passphrase').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') checkAccess();
        });
    </script>

    <style>
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(5px); }
            50% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
            100% { transform: translateX(0); }
        }
    </style>
</body>
</html>
